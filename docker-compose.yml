# ============================================================
# docker-compose.yml — StudySync / TrippleWise
#
# Secrets are loaded from a .env file in the repo root.
# Copy .env.example to .env and fill in real values before
# running `docker compose up --build`.  The .env file is
# gitignored and must NEVER be committed to version control.
# ============================================================

services:

  backend:
    build:
      context: .
      dockerfile: back-end/Dockerfile
    container_name: tripplewise-backend
    env_file:
      - .env
    ports:
      - "3001:3001"
    environment:
      MONGODB_URI: ${MONGODB_URI}
      TEST_MONGODB_URI: ${{ secrets.TEST_MONGODB_URI }}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
    networks:
      - tripplewise-net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: front-end/Dockerfile
    container_name: tripplewise-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - tripplewise-net
    restart: unless-stopped

# Shared network so nginx can proxy to 'backend' by service name
networks:
  tripplewise-net:
    driver: bridge
