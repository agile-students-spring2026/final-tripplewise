# ============================================================
# docker-compose.yml — StudySync / TrippleWise
#
# Secrets are loaded from a .env file in the repo root.
# Copy .env.example to .env and fill in real values before
# running `docker-compose up`.  The .env file is gitignored
# and must NEVER be committed to version control.
# ============================================================

services:
  mongo:
    image: mongo:7.0
    container_name: tripplewise-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
    volumes:
      - ./mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: back-end/Dockerfile
    container_name: tripplewise-backend
    ports:
      - "3001:3001"
    environment:
      # Read from .env file — never hardcode secrets here
      MONGODB_URI: ${MONGODB_URI:-mongodb://admin:password@mongo:27017/tripplewise?authSource=admin}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: front-end/Dockerfile
    container_name: tripplewise-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

# Data persistence: MongoDB data stored in ./mongo-data (gitignored)
# Use `docker-compose down -v` to wipe data for a clean start
