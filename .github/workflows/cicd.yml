
name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./back-end

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: npm install

      - name: Run backend tests
        working-directory: back-end
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          TEST_MONGODB_URI: ${{ secrets.TEST_MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NODE_ENV: test
        run: npm test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./front-end

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

  deploy:
    # Only runs on pushes to master (not on pull requests)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [backend, frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy to Digital Ocean Droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd ~/final-tripplewise

            # Pull latest code
            git pull origin master

            # Write the .env file from GitHub Secrets (never stored in repo)
            printf 'MONGODB_URI=%s\nJWT_SECRET=%s\nNODE_ENV=production\nMONGO_USERNAME=admin\nMONGO_PASSWORD=%s\n' \
              '${{ secrets.MONGODB_URI }}' \
              '${{ secrets.JWT_SECRET }}' \
              '${{ secrets.MONGO_PASSWORD }}' > .env

            # Rebuild and restart containers
            docker-compose up --build -d

            # Remove unused images to save disk space
            docker image prune -f
